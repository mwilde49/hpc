# Space Ranger Pipeline Configuration
# Edit the fields below, then launch with: tjp-launch spaceranger
# See ONBOARDING.md for detailed field descriptions.
#
# 10x Genomics Space Ranger — spatial gene expression analysis
# Native pipeline: no container required, uses installed Space Ranger binary.

# Required fields
sample_id: my_sample                    # ID for the Space Ranger run (used as output directory name)
sample_name: MySample                   # Sample name matching FASTQ filenames
fastq_dir: __SCRATCH__/myproject/fastq  # Directory containing FASTQ files
transcriptome: /groups/tprice/pipelines/references/refdata-gex-GRCh38-2024-A  # Reference transcriptome
image: __SCRATCH__/myproject/image.tif  # Brightfield or fluorescence microscope image
slide: V19J25-123                       # Visium slide serial number
area: A1                                # Capture area on the slide (A1, B1, C1, or D1)

# Resource limits (match your SLURM allocation)
localcores: 16
localmem: 120                           # GB — leave headroom below SLURM --mem

# Optional: override tool path (default: /groups/tprice/opt/spaceranger-4.0.1)
# tool_path: /groups/tprice/opt/spaceranger-4.0.1

# Optional parameters (uncomment to use)
# cytaimage: /path/to/cytassist_image.tif    # CytAssist image
# darkimage: /path/to/dark_image.tif         # Dark background fluorescence image
# colorizedimage: /path/to/color_image.tif   # Colorized fluorescence image
# reorient_images: true                      # Auto-reorient images
# loupe_alignment: /path/to/alignment.json   # Manual Loupe alignment file
